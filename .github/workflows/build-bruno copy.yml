name: Build Bruno Latest (Windows, macOS, Linux)

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Forza la build anche senza nuove versioni"
        type: boolean
        default: false
      version:
        description: "Tag specifico Bruno (es: v1.34.0). Vuoto = latest"
        required: false

#  schedule:
#    - cron: "0 */6 * * *"   # ogni 6 ore

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      build: ${{ steps.decision.outputs.build }}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 🔎 Determina versione Bruno da usare
      - name: Get Bruno version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG=$(curl -s https://api.github.com/repos/usebruno/bruno/releases/latest | jq -r .tag_name)
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      # 🔎 Versione buildata in precedenza
      - name: Read stored version
        id: stored
        shell: bash
        run: |
          if [ -f last_version.txt ]; then
            echo "stored=$(cat last_version.txt)" >> $GITHUB_OUTPUT
          else
            echo "stored=none" >> $GITHUB_OUTPUT
          fi

      # 🧠 Decide se buildare
      - name: Check if build needed
        id: decision
        shell: bash
        run: |
          FORCE="${{ github.event.inputs.force_build }}"
          if [ "$FORCE" = "true" ] || [ "${{ steps.version.outputs.tag }}" != "${{ steps.stored.outputs.stored }}" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no update
        if: steps.decision.outputs.build == 'false'
        run: echo "No new Bruno version"

  windows:
    runs-on: windows-latest
    needs: prepare
    if: needs.prepare.outputs.build == 'true'

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      # 📥 Clona Bruno
      - name: Clone Bruno
        run: git clone --depth 1 --branch ${{ needs.prepare.outputs.tag }} https://github.com/usebruno/bruno.git

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: bruno/.nvmrc
          cache: 'npm'
          cache-dependency-path: bruno/package-lock.json

      - name: Install deps
        run: |
          cd bruno
          npm install --legacy-peer-deps

      - name: Build packages
        shell: bash
        run: |
          set -euo pipefail
          cd bruno
          npm run build:bruno-common
          npm run build:bruno-converters
          npm run build:bruno-requests
          npm run build:bruno-query
          npm run build:graphql-docs
          npm run build:schema-types
          npm run build:bruno-filestore
          npm run sandbox:bundle-libraries --workspace=packages/bruno-js

      - name: Build web
        shell: bash
        run: |
          set -euo pipefail
          cd bruno
          npm run build:web

      # 🔧 Imposta la versione corretta nel package.json di electron
      - name: Set Bruno version in package.json
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.tag }}"
          VERSION_SHORT="${VERSION#v}"
          cd bruno/packages/bruno-electron
          npm version "$VERSION_SHORT" --no-git-tag-version --allow-same-version

      - name: Build Windows app
        shell: bash
        run: |
          set -euo pipefail
          cd bruno
          npm run build:electron

      - name: Package unpacked versions
        shell: bash
        run: |
          cd bruno/packages/bruno-electron/out
          7z a -tzip bruno-x64-unpacked.zip ./win-unpacked/*
          7z a -tzip bruno-arm64-unpacked.zip ./win-arm64-unpacked/*

      - name: Rename files with correct version
        shell: bash
        run: |
          cd bruno/packages/bruno-electron/out
          VERSION="${{ needs.prepare.outputs.tag }}"
          VERSION_SHORT="${VERSION#v}"
          # Rinomina gli installer
          mv "bruno_${VERSION_SHORT}_x64_win.exe" "bruno_${VERSION}_x64_win.exe"
          mv "bruno_${VERSION_SHORT}_arm64_win.exe" "bruno_${VERSION}_arm64_win.exe"
          mv "bruno_${VERSION_SHORT}_win.exe" "bruno_${VERSION}_win.exe"
          # Rinomina gli zip
          mv bruno-x64-unpacked.zip "bruno_${VERSION}_x64-unpacked.zip"
          mv bruno-arm64-unpacked.zip "bruno_${VERSION}_arm64-unpacked.zip"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: |
            bruno/packages/bruno-electron/out/*.exe
            bruno/packages/bruno-electron/out/*.zip
          if-no-files-found: error

  macos:
    runs-on: macos-latest
    needs: prepare
    if: needs.prepare.outputs.build == 'true'

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone Bruno
        run: git clone --depth 1 --branch ${{ needs.prepare.outputs.tag }} https://github.com/usebruno/bruno.git

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: bruno/.nvmrc
          cache: 'npm'
          cache-dependency-path: bruno/package-lock.json

      - name: Install deps
        run: |
          cd bruno
          npm install --legacy-peer-deps
          brew install python-setuptools

      - name: Build packages
        shell: bash
        run: |
          set -euo pipefail
          cd bruno
          npm run build:bruno-common
          npm run build:bruno-converters
          npm run build:bruno-requests
          npm run build:bruno-query
          npm run build:graphql-docs
          npm run build:schema-types
          npm run build:bruno-filestore
          npm run sandbox:bundle-libraries --workspace=packages/bruno-js

      - name: Build web
        shell: bash
        run: |
          set -euo pipefail
          cd bruno
          npm run build:web

      - name: Set Bruno version in package.json
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.tag }}"
          VERSION_SHORT="${VERSION#v}"
          cd bruno/packages/bruno-electron
          npm version "$VERSION_SHORT" --no-git-tag-version --allow-same-version

      - name: Build macOS app
        shell: bash
        run: |
          set -euo pipefail
          cd bruno
          npm run build:electron

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-macos
          path: |
            bruno/packages/bruno-electron/out/bruno_*
            !bruno/packages/bruno-electron/out/*.blockmap
          if-no-files-found: error

  linux:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.build == 'true'
    env:
      DEBIAN_FRONTEND: noninteractive
      USE_SYSTEM_MKSQUASHFS: 1

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone Bruno
        run: git clone --depth 1 --branch ${{ needs.prepare.outputs.tag }} https://github.com/usebruno/bruno.git

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: bruno/.nvmrc
          cache: 'npm'
          cache-dependency-path: bruno/package-lock.json

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools

      - name: Install deps
        run: |
          cd bruno
          npm install --legacy-peer-deps

      - name: Build packages
        shell: bash
        run: |
          set -euo pipefail
          cd bruno
          npm run build:bruno-common
          npm run build:bruno-converters
          npm run build:bruno-requests
          npm run build:bruno-query
          npm run build:graphql-docs
          npm run build:schema-types
          npm run build:bruno-filestore
          npm run sandbox:bundle-libraries --workspace=packages/bruno-js

      - name: Build web
        shell: bash
        run: |
          set -euo pipefail
          cd bruno
          npm run build:web

      - name: Set Bruno version in package.json
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.tag }}"
          VERSION_SHORT="${VERSION#v}"
          cd bruno/packages/bruno-electron
          npm version "$VERSION_SHORT" --no-git-tag-version --allow-same-version

      - name: Build Linux app
        shell: bash
        run: |
          set -euo pipefail
          cd bruno
          npm run build:electron

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: |
            bruno/packages/bruno-electron/out/bruno_*
            !bruno/packages/bruno-electron/out/*.blockmap
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: [prepare, windows, macos, linux]
    if: needs.prepare.outputs.build == 'true'

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Bruno ${{ needs.prepare.outputs.tag }} - Multi Platform Build
          body: |
            🚀 Build automatica di Bruno ${{ needs.prepare.outputs.tag }}

            **Piattaforme incluse:**
            - Windows
            - macOS
            - Linux
          files: |
            build-windows/*
            build-macos/*
            build-linux/*
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Save built version
        shell: bash
        run: |
          echo "${{ needs.prepare.outputs.tag }}" > last_version.txt

      - name: Commit version file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_version.txt
          git diff --cached --quiet || git commit -m "Update built Bruno version"
          git diff --cached --quiet || git push