name: Build Bruno Latest (Windows)

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Forza la build anche senza nuove versioni"
        type: boolean
        default: false
      version:
        description: "Tag specifico Bruno (es: v1.34.0). Vuoto = latest"
        required: false

  schedule:
    - cron: "0 */6 * * *"   # ogni 6 ore

jobs:
  check-and-build:
    runs-on: windows-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      # 🔎 Determina versione Bruno da usare
      - name: Get Bruno version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG=$(curl -s https://api.github.com/repos/usebruno/bruno/releases/latest | jq -r .tag_name)
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      # 🔎 Versione buildata in precedenza
      - name: Read stored version
        id: stored
        shell: bash
        run: |
          if [ -f last_version.txt ]; then
            echo "stored=$(cat last_version.txt)" >> $GITHUB_OUTPUT
          else
            echo "stored=none" >> $GITHUB_OUTPUT
          fi

      # 🧠 Decide se buildare
      - name: Check if build needed
        id: decision
        shell: bash
        run: |
          FORCE="${{ github.event.inputs.force_build }}"
          if [ "$FORCE" = "true" ] || [ "${{ steps.version.outputs.tag }}" != "${{ steps.stored.outputs.stored }}" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no update
        if: steps.decision.outputs.build == 'false'
        run: echo "No new Bruno version"

      # 📥 Clona Bruno
      - name: Clone Bruno
        if: steps.decision.outputs.build == 'true'
        run: git clone --depth 1 --branch ${{ steps.version.outputs.tag }} https://github.com/usebruno/bruno.git

      - name: Setup Node
        if: steps.decision.outputs.build == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        if: steps.decision.outputs.build == 'true'
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install deps
        if: steps.decision.outputs.build == 'true'
        run: |
          cd bruno
          node -e "const fs=require('fs');const pkg=require('./package.json');const ws=pkg.workspaces||[];if(!Array.isArray(ws)||ws.length===0){console.log('No workspaces found in package.json');process.exit(1);}const content='packages:\n'+ws.map(p=>'  - '+p).join('\\n')+'\\n';fs.writeFileSync('pnpm-workspace.yaml',content);"
          pnpm install

      # 👉 QUI puoi inserire patch automatiche

      - name: Build Windows app
        if: steps.decision.outputs.build == 'true'
        run: |
          cd bruno
          pnpm -C packages/bruno-electron dist

      - name: Upload artifact
        if: steps.decision.outputs.build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bruno-windows
          path: bruno/packages/bruno-electron/dist/**

      - name: Save built version
        if: steps.decision.outputs.build == 'true'
        shell: bash
        run: |
          echo "${{ steps.version.outputs.tag }}" > last_version.txt

      - name: Commit version file
        if: steps.decision.outputs.build == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_version.txt
          git commit -m "Update built Bruno version"
          git push