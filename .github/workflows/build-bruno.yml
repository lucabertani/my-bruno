name: Build Bruno Latest (Windows)

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Forza la build anche senza nuove versioni"
        type: boolean
        default: false
      version:
        description: "Tag specifico Bruno (es: v1.34.0). Vuoto = latest"
        required: false

  schedule:
    - cron: "0 */6 * * *"   # ogni 6 ore

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: windows-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 🔎 Determina versione Bruno da usare
      - name: Get Bruno version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG=$(curl -s https://api.github.com/repos/usebruno/bruno/releases/latest | jq -r .tag_name)
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      # 🔎 Versione buildata in precedenza
      - name: Read stored version
        id: stored
        shell: bash
        run: |
          if [ -f last_version.txt ]; then
            echo "stored=$(cat last_version.txt)" >> $GITHUB_OUTPUT
          else
            echo "stored=none" >> $GITHUB_OUTPUT
          fi

      # 🧠 Decide se buildare
      - name: Check if build needed
        id: decision
        shell: bash
        run: |
          FORCE="${{ github.event.inputs.force_build }}"
          if [ "$FORCE" = "true" ] || [ "${{ steps.version.outputs.tag }}" != "${{ steps.stored.outputs.stored }}" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no update
        if: steps.decision.outputs.build == 'false'
        run: echo "No new Bruno version"

      # 📥 Clona Bruno
      - name: Clone Bruno
        if: steps.decision.outputs.build == 'true'
        run: git clone --depth 1 --branch ${{ steps.version.outputs.tag }} https://github.com/usebruno/bruno.git

      - name: Setup Node
        if: steps.decision.outputs.build == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: bruno/.nvmrc
          cache: 'npm'
          cache-dependency-path: bruno/package-lock.json

      - name: Install deps
        if: steps.decision.outputs.build == 'true'
        run: |
          cd bruno
          npm install --legacy-peer-deps

      - name: Build packages
        if: steps.decision.outputs.build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd bruno
          npm run build:bruno-common
          npm run build:bruno-converters
          npm run build:bruno-requests
          npm run build:bruno-query
          npm run build:graphql-docs
          npm run build:schema-types
          npm run build:bruno-filestore
          npm run sandbox:bundle-libraries --workspace=packages/bruno-js

      - name: Build web
        if: steps.decision.outputs.build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd bruno
          npm run build:web

      # 👉 QUI puoi inserire patch automatiche

      - name: Build Windows app
        if: steps.decision.outputs.build == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd bruno
          npm run build:electron

      - name: Package unpacked versions
        if: steps.decision.outputs.build == 'true'
        shell: bash
        run: |
          cd bruno/packages/bruno-electron/out
          7z a -tzip bruno-x64-unpacked.zip ./win-unpacked/*
          7z a -tzip bruno-arm64-unpacked.zip ./win-arm64-unpacked/*

      - name: Rename files with correct version
        if: steps.decision.outputs.build == 'true'
        shell: bash
        run: |
          cd bruno/packages/bruno-electron/out
          VERSION="${{ steps.version.outputs.tag }}"
          # Rinomina gli installer
          mv bruno_*_x64_win.exe "bruno_${VERSION}_x64_win.exe"
          mv bruno_*_arm64_win.exe "bruno_${VERSION}_arm64_win.exe"
          mv bruno_*_win.exe "bruno_${VERSION}_win.exe"
          # Rinomina gli zip
          mv bruno-x64-unpacked.zip "bruno_${VERSION}_x64-unpacked.zip"
          mv bruno-arm64-unpacked.zip "bruno_${VERSION}_arm64-unpacked.zip"

      - name: Create Release
        if: steps.decision.outputs.build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Bruno ${{ steps.version.outputs.tag }} - Windows Build
          body: |
            🚀 Build automatica di Bruno ${{ steps.version.outputs.tag }} per Windows
            
            **Installer disponibili:**
            - `bruno_${{ steps.version.outputs.tag }}_x64_win.exe` - Installer per Windows x64
            - `bruno_${{ steps.version.outputs.tag }}_arm64_win.exe` - Installer per Windows ARM64
            - `bruno_${{ steps.version.outputs.tag }}_win.exe` - Installer multi-architettura (x64 + ARM64)
            
            **Unpacked (portable):**
            - `bruno_${{ steps.version.outputs.tag }}_x64-unpacked.zip` - Versione portable x64
            - `bruno_${{ steps.version.outputs.tag }}_arm64-unpacked.zip` - Versione portable ARM64
          files: |
            bruno/packages/bruno-electron/out/*.exe
            bruno/packages/bruno-electron/out/*.zip
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Save built version
        if: steps.decision.outputs.build == 'true'
        shell: bash
        run: |
          echo "${{ steps.version.outputs.tag }}" > last_version.txt

      - name: Commit version file
        if: steps.decision.outputs.build == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_version.txt
          git commit -m "Update built Bruno version"
          git push